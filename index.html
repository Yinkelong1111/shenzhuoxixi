<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>爱你沈琢 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #ff4d8d;
    --blush: #ffb3cc;
    --deep: #1a0010;
    --gold: #ffd700;
    --lavender: #e8b4e8;
  }

  body {
    background: var(--deep);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    cursor: none;
  }

  /* ── 星空背景 ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
  }

  /* ── 流星 ── */
  .meteor {
    position: fixed;
    width: 2px;
    height: 80px;
    background: linear-gradient(to bottom, transparent, #fff, var(--blush));
    border-radius: 50%;
    transform-origin: top center;
    animation: meteor-fall linear infinite;
    opacity: 0;
    z-index: 1;
  }

  @keyframes meteor-fall {
    0%   { opacity: 0; transform: translateY(-120px) rotate(30deg); }
    10%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(110vh) rotate(30deg); }
  }

  /* ── 漂浮爱心 ── */
  .heart-float {
    position: fixed;
    font-size: 18px;
    animation: float-up linear infinite;
    z-index: 2;
    opacity: 0;
    pointer-events: none;
    user-select: none;
  }

  @keyframes float-up {
    0%   { transform: translateY(110vh) scale(0.6) rotate(-10deg); opacity: 0; }
    10%  { opacity: 0.8; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(-10vh) scale(1.1) rotate(10deg); opacity: 0; }
  }

  /* ── 满屏文字容器 ── */
  #text-rain {
    position: fixed; inset: 0; z-index: 3;
    pointer-events: none;
  }

  .love-word {
    position: absolute;
    font-family: 'Ma Shan Zheng', serif;
    font-weight: 700;
    color: var(--blush);
    opacity: 0;
    animation: word-appear ease-in-out infinite;
    text-shadow: 0 0 12px var(--rose), 0 0 30px rgba(255,77,141,0.5);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  @keyframes word-appear {
    0%   { opacity: 0; transform: scale(0.5) rotate(-5deg); }
    20%  { opacity: 1; transform: scale(1.05) rotate(2deg); }
    60%  { opacity: 0.85; }
    100% { opacity: 0; transform: scale(0.8) rotate(5deg); }
  }

  /* ── 中央卡片 ── */
  #center {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .card {
    background: rgba(26, 0, 16, 0.6);
    border: 1.5px solid rgba(255, 179, 204, 0.35);
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(255, 77, 141, 0.25), 0 0 120px rgba(255, 77, 141, 0.1);
    animation: card-pulse 4s ease-in-out infinite;
    pointer-events: auto;
    max-width: 88vw;
  }

  @keyframes card-pulse {
    0%, 100% { box-shadow: 0 0 60px rgba(255,77,141,0.25), 0 0 120px rgba(255,77,141,0.1); }
    50%       { box-shadow: 0 0 80px rgba(255,77,141,0.45), 0 0 160px rgba(255,77,141,0.2); }
  }

  .title-big {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(36px, 10vw, 72px);
    color: #fff;
    line-height: 1.2;
    text-shadow: 0 0 20px var(--rose), 0 0 50px rgba(255,77,141,0.7);
    letter-spacing: 0.06em;
    animation: glow-pulse 2.5s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { text-shadow: 0 0 20px var(--rose), 0 0 50px rgba(255,77,141,0.7); }
    50%       { text-shadow: 0 0 35px var(--rose), 0 0 80px rgba(255,77,141,1), 0 0 120px var(--blush); }
  }

  .subtitle {
    margin-top: 16px;
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(14px, 3.5vw, 20px);
    color: var(--lavender);
    letter-spacing: 0.12em;
    opacity: 0.9;
  }

  .heart-big {
    font-size: clamp(48px, 14vw, 90px);
    display: block;
    margin: 18px auto 0;
    animation: heartbeat 1.2s ease-in-out infinite;
    filter: drop-shadow(0 0 18px var(--rose));
    line-height: 1;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.25); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.18); }
    56%       { transform: scale(1); }
  }

  .poem {
    margin-top: 22px;
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(12px, 3vw, 16px);
    color: rgba(255, 220, 230, 0.75);
    line-height: 2;
    letter-spacing: 0.1em;
    border-top: 1px solid rgba(255,179,204,0.2);
    padding-top: 18px;
  }

  /* ── 自定义光标 ── */
  #cursor {
    position: fixed;
    width: 22px; height: 22px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s;
    font-size: 18px;
  }

  /* ── 点击涟漪 ── */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid var(--rose);
    pointer-events: none;
    z-index: 9998;
    animation: ripple-out 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
  }

  @keyframes ripple-out {
    to { width: 120px; height: 120px; opacity: 0; }
  }

  /* ── 旋转小星星装饰 ── */
  .orbit-star {
    position: fixed;
    font-size: 14px;
    z-index: 4;
    animation: orbit linear infinite;
    pointer-events: none;
    opacity: 0.7;
  }

  @keyframes orbit {
    from { transform: rotate(0deg) translateX(var(--r)) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(var(--r)) rotate(-360deg); }
  }
</style>
</head>
<body>

<!-- 星空 Canvas -->
<canvas id="starfield"></canvas>

<!-- 满屏文字雨 -->
<div id="text-rain"></div>

<!-- 漂浮爱心 & 流星由 JS 生成 -->

<!-- 中央卡片 -->
<div id="center">
  <div class="card">
    <div class="title-big">爱你，沈琢</div>
    <span class="heart-big">💗</span>
    <div class="subtitle">✦ &nbsp; 你是我星河里最亮的那颗 &nbsp; ✦</div>
    <div class="poem">
      山有木兮木有枝<br>
      心悦君兮君不知<br>
      而我只想让你知道<br>
      <strong style="color:var(--blush)">我很喜欢你</strong>
    </div>
  </div>
</div>

<!-- 自定义光标 -->
<div id="cursor">💖</div>

<script>
// ── 星空 ──
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars(n = 280) {
  stars = [];
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.6 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.003,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a0010';
  ctx.fillRect(0, 0, W, H);

  // 柔和的径向渐变背景
  const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grd.addColorStop(0, 'rgba(80,0,50,0.5)');
  grd.addColorStop(1, 'rgba(10,0,10,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(t * s.speed + s.phase));
    ctx.save();
    ctx.globalAlpha = alpha * s.a;
    ctx.shadowColor = '#ffb3cc';
    ctx.shadowBlur  = s.r * 4;
    ctx.fillStyle   = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

let raf;
function animate(t) {
  drawStars(t * 0.001);
  raf = requestAnimationFrame(animate);
}

resize();
initStars();
requestAnimationFrame(animate);
window.addEventListener('resize', () => { resize(); initStars(); });

// ── 文字雨 ──
const rain = document.getElementById('text-rain');
const phrases = [
  '爱你沈琢','❤️ 爱你','沈琢 ❤','喜欢你','想你','爱你哦',
  '爱你沈琢 💕','💗 爱你','一直爱你','超喜欢你','只爱你','沈琢💖',
  '爱你呀','想一直陪着你','爱你沈琢❤️','你是我的宝贝'
];
const sizes  = [14, 16, 18, 22, 26, 30, 36, 42];
const colors = ['#ff4d8d','#ffb3cc','#ff80ab','#ffd1dc','#e8b4e8','#ffcce5','#ff6699'];

function spawnWord() {
  const el = document.createElement('div');
  el.className = 'love-word';
  el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
  const size = sizes[Math.floor(Math.random() * sizes.length)];
  el.style.fontSize = size + 'px';
  el.style.color = colors[Math.floor(Math.random() * colors.length)];
  el.style.left  = Math.random() * 95 + 'vw';
  el.style.top   = Math.random() * 92 + 'vh';
  const dur = 3 + Math.random() * 5;
  el.style.animationDuration  = dur + 's';
  el.style.animationDelay     = Math.random() * 2 + 's';
  el.style.transform = `rotate(${(Math.random()-0.5)*20}deg)`;
  rain.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2.5) * 1000);
}

setInterval(spawnWord, 260);
for (let i = 0; i < 30; i++) spawnWord();

// ── 流星 ──
function spawnMeteor() {
  const m = document.createElement('div');
  m.className = 'meteor';
  m.style.left = Math.random() * 100 + 'vw';
  m.style.top  = '-10px';
  const dur = 1.2 + Math.random() * 2;
  m.style.animationDuration = dur + 's';
  m.style.animationDelay   = Math.random() * 3 + 's';
  document.body.appendChild(m);
  setTimeout(() => m.remove(), (dur + 3.5) * 1000);
}

setInterval(spawnMeteor, 900);
for (let i = 0; i < 5; i++) spawnMeteor();

// ── 漂浮爱心 ──
const heartChars = ['💕','💗','💖','💓','🌸','✨','⭐','🌟','💫','🌺','💝'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart-float';
  h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
  h.style.left = Math.random() * 98 + 'vw';
  const dur = 5 + Math.random() * 7;
  h.style.animationDuration = dur + 's';
  h.style.animationDelay   = Math.random() * 2 + 's';
  h.style.fontSize = (12 + Math.random() * 22) + 'px';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), (dur + 2.5) * 1000);
}

setInterval(spawnHeart, 400);
for (let i = 0; i < 18; i++) spawnHeart();

// ── 自定义光标 ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

// ── 点击涟漪 ──
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top  = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 900);

  // 点击飞出爱心
  for (let i = 0; i < 6; i++) {
    const h = document.createElement('div');
    h.style.cssText = `
      position:fixed; left:${e.clientX}px; top:${e.clientY}px;
      font-size:${14+Math.random()*18}px; pointer-events:none;
      z-index:9999; animation:none;
    `;
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    document.body.appendChild(h);
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    h.animate([
      { transform:'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.3)`, opacity: 0 }
    ], { duration: 700 + Math.random()*400, easing:'ease-out', fill:'forwards' });
    setTimeout(() => h.remove(), 1200);
  }
});

// ── 触摸支持（微信） ──
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const event = new MouseEvent('click', { clientX: t.clientX, clientY: t.clientY });
  document.dispatchEvent(event);
});
</script>
</body>
</html>
